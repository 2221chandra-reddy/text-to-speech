<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Cloning Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007BFF;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        h2, h3 {
            text-align: center;
        }

        .section {
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>🎙 Voice Cloning Studio</h2>

    <!-- Upload Section -->
    <div class="section">
        <h3>Upload Reference Voice</h3>
        <input type="file" id="voiceFile">
        <br>
        <button onclick="upload()">Upload Voice</button>
        <button onclick="preview()">Listen Cloned Voice</button>
    </div>

    <!-- Audio Player -->
    <div class="section">
        <audio id="player" controls autoplay></audio>
    </div>

    <hr>

    <!-- TTS Section -->
    <div class="section">
        <h3>Text To Speech</h3>

        <textarea id="text" rows="6" placeholder="Enter your text here..."></textarea>

        <br><br>

        <button onclick="generate()">Generate Speech</button>
        <button onclick="download()">Download MP3</button>
    </div>

</div>

<script>
function upload(){
    let file = document.getElementById("voiceFile").files[0];
    if(!file){
        alert("Please select a voice file first");
        return;
    }

    let form = new FormData();
    form.append("voice", file);

    alert("Uploading and cloning voice...");

    fetch("/upload", {
        method: "POST",
        body: form
    })
    .then(res => res.json())
    .then(data => alert("Voice cloned successfully"))
    .catch(() => alert("Upload failed"));
}

function preview(){
    let player = document.getElementById("player");
    player.pause();
    player.src = "";

    fetch("/preview")
    .then(res => res.blob())
    .then(blob => {
        let url = URL.createObjectURL(blob);
        player.src = url;
        player.play();
    })
    .catch(() => alert("Preview not available"));
}

function generate(){
    let text = document.getElementById("text").value;

    if(text.trim() === ""){
        alert("Please enter some text");
        return;
    }

    let player = document.getElementById("player");
    player.pause();
    player.src = "";

    let form = new FormData();
    form.append("text", text);

    alert("Generating speech...");

    fetch("/generate", {
        method: "POST",
        body: form
    })
    .then(res => res.blob())
    .then(blob => {
        let url = URL.createObjectURL(blob);
        player.src = url;
        player.play();
    })
    .catch(() => alert("Generation failed"));
}

function download(){
    window.location = "/download";
}
</script>

</body>
</html>
